alert:
  bigger_is_better: false
  threshold: 125%
chart:
  description: lat_unix
  legend: Average unix latency on {system}
  title: '[Unix sockets] The latency of write+read'
  unit: "\xB5s"   # Unicode for microsecond
result_extraction:
  result_index: 5
  search_pattern: 'sock stream latency: +[0-9.]+'
