alert:
  bigger_is_better: false
  threshold: 125%
chart:
  description: lat_udp
  legend: Average UDP latency over virtio-net on {system}
  title: '[UDP sockets] The latency of write+read (virtio-net)'
  unit: "\xB5s"
result_extraction:
  result_index: 5
  search_pattern: 'UDP latency using [0-9.]+: +[0-9.]+'
