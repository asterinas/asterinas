alert:
  bigger_is_better: true
  threshold: 125%
chart:
  description: redis-benchmark -n 100000 -c 20 -t get
  legend: Average RPS of GET over virtio-net between Host Linux and Guest {system}
  title: Redis GET performance with 20 concurrency and 100000 requests in total
  unit: request per second
result_extraction:
  result_index: 3
  search_pattern: 'throughput summary: +[0-9.]+'
