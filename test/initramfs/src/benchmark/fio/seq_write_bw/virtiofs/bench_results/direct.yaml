alert:
  bigger_is_better: true
  threshold: 125%
chart:
  description: fio -filename=/virtiofs/fio-test -size=1G -bs=1M -direct=1
  legend: Average direct file write bandwidth on {system}
  title: '[virtio-fs] The bandwidth of direct sequential writes'
  unit: MB/s
result_extraction:
  nth_occurrence: 2
  result_index: 2
  search_pattern: bw=[0-9.]+[KMGT]?i?B/s
