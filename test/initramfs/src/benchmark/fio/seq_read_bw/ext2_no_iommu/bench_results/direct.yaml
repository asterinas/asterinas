alert:
  bigger_is_better: true
  threshold: 125%
chart:
  description: fio -filename=/ext2/fio-test -size=1G -bs=1M -direct=1
  legend: Average direct file read bandwidth on {system}
  title: '[Ext2] The bandwidth of direct sequential reads (IOMMU disabled on Asterinas)'
  unit: MB/s
result_extraction:
  nth_occurrence: 2
  result_index: 2
  search_pattern: bw=[0-9.]+[KMGT]?i?B/s
