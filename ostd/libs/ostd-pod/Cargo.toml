[package]
name = "ostd-pod"
version = "0.2.0"
description = "A marker trait for plain old data (POD)"
readme = "README.md"
repository.workspace = true
license.workspace = true
edition.workspace = true

[dependencies]
ostd-pod-macros = { path = "macros", version = "0.2.0", optional = true }
padding-struct = { path = "../padding-struct", version = "0.1.0", optional = true }
zerocopy.workspace = true

[features]
default = ["macros"]
macros = ["ostd-pod-macros", "padding-struct"]

[lints]
workspace = true
