[package]
name = "linux-bzimage-setup"
description = "The linux bzImage setup binary"
version.workspace = true
repository.workspace = true
license.workspace = true
edition.workspace = true

[[bin]]
name = "linux-bzimage-setup"
path = "src/main.rs"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
cfg-if.workspace = true
linux-boot-params.workspace = true
log.workspace = true
uart_16550.workspace = true
xmas-elf.workspace = true
zune-inflate.workspace = true

[target.x86_64-unknown-none.dependencies]
tdx-guest = { workspace = true, optional = true }
uefi-raw.workspace = true
uefi.workspace = true

[target.x86_64-i386_pm-none.dependencies]
uefi-raw.workspace = true

[features]
default = ["cvm_guest"]
debug_print = []
cvm_guest = ["dep:tdx-guest"]

[lints]
workspace = true
