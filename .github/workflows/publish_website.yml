name: Publish website

on:
  workflow_dispatch:
  pull_request:
    paths:
      - VERSION
      - book/**
      - .github/workflows/publish_website.yml
  push:
    branches:
      - main
    paths:
      - VERSION
      - book/**
      - .github/workflows/publish_website.yml

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container: asterinas/asterinas:0.18.0-20260618
    steps:
      - uses: actions/checkout@v2
        with:
          repository: 'asterinas/asterinas'
          path: 'asterinas'

      - name: Cache .lycheecache
        uses: actions/cache@v6
        with:
          path: asterinas/book/.lycheecache
          key: lychee-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          # Cache lookup strategy:
          # 1) Exact key (os + ref_name + sha), hit on rerun of the same commit.
          # 2) If exact key misses, restore by os + ref_name prefix; newest match wins.
          # 3) Final fallback is os-only prefix; newest match wins.
          # Multiple restore-keys lines are intentional for progressive fallback (from specific to broad).
          restore-keys: |
            lychee-${{ runner.os }}-${{ github.ref_name }}
            lychee-${{ runner.os }}-

      - name: Build the website
        env:
          # Avoid hitting rate limit when lychee accesses github links.
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd asterinas/book
          make check
          make

      - name: Deploy website
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          BOOK_PUBLISH_KEY: ${{ secrets.BOOK_PUBLISH_KEY }}
        run: |
          echo "$BOOK_PUBLISH_KEY\n" > ./book_publish_key
          chmod 600 ./book_publish_key
          ssh-keygen -y -f ./book_publish_key > /dev/null
          ssh-keyscan -t rsa github.com >> ./known_hosts
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          GIT_SSH_COMMAND="ssh -i ./book_publish_key -o UserKnownHostsFile=./known_hosts" \
            git clone git@github.com:asterinas/book.git temp_book
          cd temp_book
          git checkout --orphan newBranch
          git rm -rf *
          cp -r ../asterinas/book/book/* ./
          git add -A
          git commit -am "Update website"
          git branch -D main
          git branch -m main
          GIT_SSH_COMMAND="ssh -i ../book_publish_key -o UserKnownHostsFile=../known_hosts" \
            git push -f origin main
