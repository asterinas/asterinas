# A comprehensive test for NixOS.
#
# This test suite is designed to run on GitHub's larger runners,
# leveraging their extended storage capacity.
# Here, we can thoroughly test a wider range of NixOS commands and various applications.
# As GitHub charges more for these premium runners,
# these tests will only run when changes are detected in AsterNixOS-specific content.
name: Test AsterNixOS (full)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - distro/**
      - .github/workflows/test_nixos_full.yml
      - tools/nixos/**
  push:
    branches:
      - main
    paths:
      - distro/**
      - .github/workflows/test_nixos_full.yml
      - tools/nixos/**

jobs:
  full-nixos-test:
    runs-on: ubuntu-4-cores-150GB-ssd
    container:
      image: asterinas/asterinas:0.17.0-20251217
      options: -v /dev:/dev --privileged
    
    strategy:
      fail-fast: false
      matrix:
        test:
          - name: nix-commands
            disk_size: 6144
          - name: podman
            disk_size: 8192

    name: Test ${{ matrix.test.name }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Generate the configuration.nix for the test
        run: |
          nix-build ./distro/etc_nixos/generate_config.nix --argstr configName ${{ matrix.test.name }} -o configuration.nix
          cp -L configuration.nix distro/etc_nixos/configuration.nix
          
      - name: Run tests
        run: |
          TEST_COMMAND="test-${{ matrix.test.name }}.sh"

          make nixos NIXOS_DISK_SIZE_IN_MB=${{ matrix.test.disk_size }} NIXOS_TEST_COMMAND="${TEST_COMMAND}"
          make run_nixos || true

      - name: Check results
        run: |
          TEST_NAME="${{ matrix.test.name }}"
          SUCCESS_MSG="CI-TEST-RESULT: SUCCESS: ${TEST_NAME}"
          
          if ! grep -q "${SUCCESS_MSG}" qemu.log; then
            echo "Test '${TEST_NAME}' failed. Success message not found."
            exit 1
          fi
          
          echo "Test '${TEST_NAME}' succeeded!"